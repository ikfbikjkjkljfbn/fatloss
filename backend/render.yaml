services:
  - type: web
    name: fit-tracker-backend
    runtime: node
    repo: https://github.com/yourusername/your-repo
    plan: free
    envVars:
      - key: NODE_VERSION
        value: 18
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: EMAIL_USER
        sync: false
      - key: EMAIL_PASS
        sync: false
      - key: FRONTEND_URL
        sync: false
    buildCommand: npm install
    startCommand: npm start